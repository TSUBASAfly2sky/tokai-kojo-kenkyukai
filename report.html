<header id="site-header">

      </div>
    </a>

    <nav id="main-nav">
      <ul>
        <li><a href="index.html">ホーム</a></li>
        <li><a href="index.html#about">会の概要</a></li>
        <li><a href="index.html#news">お知らせ</a></li>
        <li><a href="report.html" class="active">活動報告</a></li>
        <li><a href="index.html#contact">お問い合わせ</a></li>
      </ul>
    </nav>

    <button class="hamburger" id="hamburger" aria-label="メニュー">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- ===== ページヘッド ===== -->
<section class="page-head">
  <div class="page-head-inner">
    <div class="breadcrumb">
      <a href="index.html">ホーム</a><span class="sep">›</span>活動報告
    </div>
    <h1 class="page-title">活動報告</h1>
    <p class="page-subtitle">ACTIVITY REPORT — 見学会・講演会の記録</p>
  </div>
</section>

<!-- ===== 報告一覧 ===== -->
<section class="section">
  <div class="filter-bar container">
    <span class="label">絞り込み:</span>
    <button class="filter-btn active" data-year="all">すべて</button>
    <button class="filter-btn" data-year="2026">2026年</button>
    <button class="filter-btn" data-year="2025">2025年</button>
    <button class="filter-btn" data-year="2024">2024年</button>
  </div>

  <div class="report-list container" id="reportList">
    <div class="empty-state">読み込み中...</div>
  </div>
</section>

<!-- ===== フッター ===== -->
<footer id="site-footer">
  <div class="footer-inner">
    <div class="footer-section">
      <h3>東海古城研究会</h3>
      <p>東海地方の古城・城跡を調査・研究する会です。</p>
    </div>
    <div class="footer-section">
      <h3>サイトマップ</h3>
      <ul>
        <li><a href="index.html">ホーム</a></li>
        <li><a href="index.html#about">会の概要</a></li>

  </div>
</footer>

<script src="js/data.js"></script>
<script>
// ハンバーガー
document.getElementById('hamburger').addEventListener('click', function() {
  document.getElementById('main-nav').classList.toggle('open');
  document.getElementById('navOverlay').classList.toggle('show');
});
document.getElementById('navOverlay').addEventListener('click', function() {
  document.getElementById('main-nav').classList.remove('open');
  document.getElementById('navOverlay').classList.remove('show');
});

let currentYear = 'all';

async function renderReports() {
  const el = document.getElementById('reportList');
  try {
    const data = await TKK.loadData();
    let items = TKK.sortByDateDesc((data.reports || []).filter(r => TKK.isPublished(r)));

    if (currentYear !== 'all') {
      items = items.filter(r => {
        const y = new Date(r.date).getFullYear();
        return String(y) === String(currentYear);
      });
    }

    if (items.length === 0) {
      el.innerHTML = '<div class="empty-state">該当する活動報告はありません。</div>';
      return;
    }

    el.innerHTML = items.map(r => {
      const thumb = (r.images && r.images.length > 0) ? r.images[0] : '';
      return `
      <a href="report-detail.html?id=${encodeURIComponent(r.id)}" class="report-list-card ${thumb ? 'has-thumb' : ''}">
        ${thumb ? `<div class="report-thumb"><img src="${thumb}" alt="" loading="lazy"></div>` : ''}
        <div class="report-list-body">
          <div class="meta">
            <span class="date">${TKK.formatDate(r.date)}</span>
            ${r.location ? `<span class="loc">${TKK.escapeHtml(r.location)}</span>` : ''}
            ${r.images && r.images.length > 0 ? `<span class="photo-count">📷 ${r.images.length}枚</span>` : ''}
          </div>
          <h3>${TKK.escapeHtml(r.title)}</h3>
          <p>${TKK.escapeHtml(r.content || '')}</p>
        </div>
      </a>
      `;
    }).join('');
  } catch(e) {
    el.innerHTML = '<div class="empty-state">読み込みに失敗しました。</div>';
  }
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentYear = btn.dataset.year;
    renderReports();
  });
});

renderReports();
</script>
</body>
</html>
