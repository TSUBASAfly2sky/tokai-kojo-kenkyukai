<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>活動報告 | 東海古城研究会</title>
  <meta name="description" content="東海古城研究会の活動報告一覧です。見学会・講演会の報告をご覧いただけます。">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ====== ヘッダー ====== -->
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <svg class="logo-mark" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <g fill="none" stroke="#1c3149" stroke-width="1.6" stroke-linejoin="round">
            <path d="M10 50 L10 28 L18 28 L18 22 L24 22 L24 16 L30 10 L36 16 L36 22 L42 22 L42 28 L50 28 L50 50 Z" fill="#faf7ee"/>
            <path d="M10 50 L50 50" stroke-width="2.2"/>
            <path d="M14 28 L14 22 M22 22 L22 16 M30 14 L30 16 M38 22 L38 16 M46 28 L46 22"/>
            <rect x="27" y="35" width="6" height="12" fill="#1c3149" stroke="none"/>
          </g>
          <circle cx="30" cy="10" r="2" fill="#b08545"/>
        </svg>
        <span class="logo-text">
          <span class="ja">東海古城研究会</span>
          <span class="en">TOKAI KOJO KENKYUKAI</span>
        </span>
      </a>

      <button class="nav-toggle" aria-label="メニュー" id="navToggle">
        <span></span><span></span><span></span>
      </button>

      <nav class="site-nav" id="siteNav">
        <ul>
          <li><a href="index.html">ホーム</a></li>
          <li><a href="index.html#about">会の概要</a></li>
          <li><a href="index.html#news">お知らせ</a></li>
          <li><a href="report.html">活動報告</a></li>
          <li><a href="index.html#contact">お問い合わせ</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- ====== ページヘッド ====== -->
  <section class="page-head">
    <div class="page-head-inner">
      <div class="breadcrumb">
        <a href="index.html">ホーム</a><span class="sep">›</span>活動報告
      </div>
      <h1 class="page-title">活動報告</h1>
      <p class="page-subtitle">ACTIVITY REPORT — 見学会・講演会の記録</p>
    </div>
  </section>

  <!-- ====== 報告一覧 ====== -->
  <section class="section">
    <div class="section-inner">
      <div class="filter-bar">
        <span class="label">絞り込み：</span>
        <button class="filter-btn active" data-year="all">すべて</button>
        <button class="filter-btn" data-year="2026">2026年</button>
        <button class="filter-btn" data-year="2025">2025年</button>
        <button class="filter-btn" data-year="2024">2024年</button>
      </div>

      <div class="report-detail-list" id="reportList">
        <div class="empty-state">読み込み中...</div>
      </div>
    </div>
  </section>

  <!-- ====== フッター ====== -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-col">
        <h4>🏯 東海古城研究会</h4>
        <p>東海地方の古城・城跡を<br>調査・研究する会です。</p>
      </div>
      <div class="footer-col">
        <h4>サイトマップ</h4>
        <ul>
          <li><a href="index.html">ホーム</a></li>
          <li><a href="index.html#about">会の概要</a></li>
          <li><a href="index.html#news">お知らせ</a></li>
          <li><a href="report.html">活動報告</a></li>
          <li><a href="index.html#contact">お問い合わせ</a></li>
        </ul>
      </div>
      <div class="footer-col">
        <h4>更新・管理</h4>
        <ul>
          <li><a href="admin.html">管理画面</a></li>
        </ul>
      </div>
    </div>
    <div class="footer-bottom">
      © 2026 TOKAI KOJO KENKYUKAI &nbsp;·&nbsp; ALL RIGHTS RESERVED
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script>
    // ハンバーガーメニュー
    document.getElementById('navToggle').addEventListener('click', function() {
      this.classList.toggle('active');
      document.getElementById('siteNav').classList.toggle('open');
    });

    let currentYearFilter = 'all';

    document.addEventListener('DOMContentLoaded', function() {
      TKK.renderReports('reportList', currentYearFilter);

      // フィルター動作
      document.querySelectorAll('.filter-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          currentYearFilter = this.dataset.year;
          TKK.renderReports('reportList', currentYearFilter);
        });
      });
    });
  </script>
</body>
</html>
