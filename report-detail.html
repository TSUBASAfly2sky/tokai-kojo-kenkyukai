<!-- ===== ページヘッド ===== -->

    <div class="breadcrumb">

<!-- ===== フッター ===== -->

  <div class="footer-inner">
    <div class="footer-section">
      <h3>東海古城研究会</h3>
      <p>東海地方の古城・城跡を調査・研究する会です。</p>
    </div>
    <div class="footer-section">
      <h3>サイトマップ</h3>

<!-- ライトボックス -->
<div id="lightbox" role="dialog" aria-modal="true" aria-label="写真拡大表示" style="
  display:none; position:fixed; inset:0; z-index:9000;
  background:rgba(0,0,0,0.92); cursor:pointer;
  align-items:center; justify-content:center;
">
  <button id="lightboxClose" aria-label="閉じる" style="
    position:absolute; top:16px; right:24px;
    background:none; border:none; color:#fff;
    font-size:2.4rem; line-height:1; cursor:pointer; z-index:1;
  ">×</button>
  <img id="lightboxImg" src="" alt="拡大写真" style="
    max-width:90vw; max-height:90vh; object-fit:contain;
    box-shadow:0 4px 32px rgba(0,0,0,0.6); border-radius:4px;
    pointer-events:none;
  ">
</div>

<script src="js/data.js"></script>
<script>
// ハンバーガー
document.getElementById('hamburger').addEventListener('click', function() {
  document.getElementById('main-nav').classList.toggle('open');
  document.getElementById('navOverlay').classList.toggle('show');
});
document.getElementById('navOverlay').addEventListener('click', function() {
  document.getElementById('main-nav').classList.remove('open');
  document.getElementById('navOverlay').classList.remove('show');
});

async function renderDetail() {
  const id = TKK.getQueryParam('id');
  const el = document.getElementById('reportDetail');
  const titleHolder = document.getElementById('pageTitleHolder');

  if (!id) {
    el.innerHTML = '<div class="empty-state">記事IDが指定されていません。</div>';
    return;
  }

  try {
    const data = await TKK.loadData();
    const item = (data.reports || []).find(r => r.id === id && TKK.isPublished(r));

    if (!item) {
      el.innerHTML = '<div class="empty-state">該当する記事が見つかりませんでした。</div>';
      return;
    }

    // ページタイトル
    document.title = `${item.title} | 活動報告 | 東海古城研究会`;
    titleHolder.textContent = '活動報告';

    // 写真を取得（新フォーマット: data-images.json / 旧フォーマット: item.images）
    let images = item.images || [];
    if (images.length === 0) {
      try {
        const imgRes = await fetch('data-images.json');
        if (imgRes.ok) {
          const imagesData = await imgRes.json();
          images = imagesData[item.id] || [];
        }
      } catch(e) {}
    }

    const galleryHtml = images.length > 0 ? `
      <div class="report-gallery">
        ${images.map((src, i) => `
          <div class="report-gallery-item" role="button" tabindex="0"
               style="cursor:zoom-in;"
               data-src="${src}"
               aria-label="${TKK.escapeHtml(item.title)} 写真${i + 1}を拡大">
            <img src="${src}" alt="${TKK.escapeHtml(item.title)} 写真${i + 1}" loading="lazy">
          </div>
        `).join('')}
      </div>
    ` : '';

    el.innerHTML = `
      <div class="report-detail-meta">
        <span class="date">${TKK.formatDate(item.date)}</span>
        ${item.location ? `<span class="loc">${TKK.escapeHtml(item.location)}</span>` : ''}
      </div>
      <h1 class="report-detail-title">${TKK.escapeHtml(item.title)}</h1>
      <div class="report-detail-body">${TKK.escapeHtml(item.content || '')}</div>
      ${galleryHtml}
    `;
  } catch(e) {
    el.innerHTML = '<div class="empty-state">読み込みに失敗しました。</div>';
  }
}

renderDetail();

/* ===== ライトボックス ===== */
const lightbox     = document.getElementById('lightbox');
const lightboxImg  = document.getElementById('lightboxImg');
const lightboxClose = document.getElementById('lightboxClose');

function openLightbox(src) {
  lightboxImg.src = src;
  lightbox.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  lightbox.style.display = 'none';
  lightboxImg.src = '';
  document.body.style.overflow = '';
}

// ギャラリーのクリック（動的に生成されるのでdocumentに委任）
document.addEventListener('click', function(e) {
  const item = e.target.closest('[data-src]');
  if (item) { openLightbox(item.dataset.src); return; }
  if (e.target === lightbox || e.target === lightboxClose) closeLightbox();
});

// キーボード（Escで閉じる）
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
});
</script>
</body>
</html>
